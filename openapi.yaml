openapi: 3.0.3
info:
  title: Hero API (daro-reporter)
  description: |
    농업인 안전 모니터링 Hero — Android 앱·보건소 대시보드가 사용하는 REST API.

    - Android 앱: POST /users/register, POST /health, POST /alert
    - 대시보드: GET /users, GET /alert, guardian/* (JWT)
    - Twilio 웹훅: /twilio/* (외부 전용, 앱에서 호출하지 않음)

    계약 변경 시 이 파일을 먼저 수정한 뒤 android-native heronative/data/ApiModels.kt를 맞춥니다.
  version: 0.2.0
  contact:
    name: Hero / daro-reporter

servers:
  - url: https://daro-reporter-production.up.railway.app
    description: Production (Railway)
  - url: http://localhost:3000
    description: Local NestJS (`npm run start:dev`)

tags:
  - name: System
  - name: Users
    description: 농업인 등록·조회 (Android Onboarding)
  - name: Health
    description: 심박·걸음·GPS 주기 전송 (Android)
  - name: Alert
    description: 기기 이벤트·낙상 등 (Android)
  - name: Guardian
    description: 보호자 대시보드 (JWT)
  - name: Twilio
    description: Twilio 콜백 (내부)

paths:
  /:
    get:
      tags: [System]
      summary: 서버 상태
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: Hero Backend

  /users/register:
    post:
      tags: [Users]
      summary: 농업인 등록
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 전화번호 중복 (Phone already registered)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NestError'
              example:
                statusCode: 409
                message: Phone already registered

  /users/by-phone/{phone}:
    get:
      tags: [Users]
      summary: 전화번호로 사용자 조회 (409 이어하기)
      operationId: getUserByPhone
      parameters:
        - name: phone
          in: path
          required: true
          schema:
            type: string
            minLength: 10
          example: '01012345678'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}:
    get:
      tags: [Users]
      summary: 사용자 상세 (보호자·최근 위치 포함)
      operationId: getUserDetail
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/baseline:
    get:
      tags: [Users]
      summary: 사용자 baseline 심박
      operationId: getUserBaseline
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  baseline_bpm:
                    type: number
                  baseline_updated_at:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'

  /users:
    get:
      tags: [Users]
      summary: 사용자 목록 + 상태 (대시보드)
      operationId: listUsers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserWithStatus'

  /health:
    post:
      tags: [Health]
      summary: 헬스 데이터 수신 (10분 주기)
      operationId: postHealth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthDataRequest'
      responses:
        '200':
          description: 저장 및 이상 감지 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthDataResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /alert:
    post:
      tags: [Alert]
      summary: 기기 이벤트 (낙상 등)
      operationId: postAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPostResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags: [Alert]
      summary: 알림 목록 (대시보드)
      operationId: listAlerts
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  alerts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /alert/{id}:
    get:
      tags: [Alert]
      summary: 알림 상세
      operationId: getAlertDetail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Alert]
      summary: 알림 상태 변경
      operationId: patchAlertStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
      responses:
        '200':
          description: OK

  /guardian/login:
    post:
      tags: [Guardian]
      summary: 보호자 로그인 (JWT)
      operationId: guardianLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, name]
              properties:
                phone:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuardianLoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guardian/emergency-access:
    get:
      tags: [Guardian]
      summary: SMS 긴급 링크 토큰 검증
      operationId: guardianEmergencyAccess
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guardian/my-users:
    get:
      tags: [Guardian]
      summary: 연결된 농업인 목록
      operationId: guardianMyUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guardian/my-users/{userId}:
    get:
      tags: [Guardian]
      summary: 농업인 상태
      operationId: guardianUserStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'

  /guardian/my-users/{userId}/alerts:
    get:
      tags: [Guardian]
      summary: 농업인 알림 이력
      operationId: guardianUserAlerts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
        '401':
          $ref: '#/components/responses/Unauthorized'

  /twilio/voice-response:
    post:
      tags: [Twilio]
      summary: Twilio 음성 응답 웹훅
      operationId: twilioVoiceResponse
      responses:
        '200':
          description: TwiML

  /twilio/voice-status:
    post:
      tags: [Twilio]
      summary: Twilio 통화 상태 웹훅
      operationId: twilioVoiceStatus
      responses:
        '200':
          description: OK

  /twilio/recording:
    post:
      tags: [Twilio]
      summary: Twilio 녹음 웹훅
      operationId: twilioRecording
      responses:
        '200':
          description: OK

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "POST /guardian/login 응답의 token"

  parameters:
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: 요청 본문 검증 실패
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/NestError'
              - $ref: '#/components/schemas/ValidationError'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NestError'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NestError'

  schemas:
    NestError:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          oneOf:
            - type: string
            - type: array
              items:
                type: string

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: Invalid payload
        details:
          type: array
          items:
            type: object
            additionalProperties: true

    Guardian:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
        phone:
          type: string
          minLength: 10
        relation:
          type: string

    RegisterRequest:
      type: object
      required: [name, phone, device_id]
      properties:
        name:
          type: string
        phone:
          type: string
          minLength: 10
        device_id:
          type: string
          description: 앱에서 생성하는 기기 ID (예. hero-1730000000000)
        gender:
          type: string
          enum: [male, female]
        birth_date:
          type: string
          description: YYYY-MM-DD
        guardians:
          type: array
          items:
            $ref: '#/components/schemas/Guardian'
        heart_rate_history:
          type: array
          items:
            type: number
          description: 등록 시 baseline 계산용 (선택)

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        device_id:
          type: string
        gender:
          type: string
          nullable: true
        birth_date:
          type: string
          nullable: true
        baseline_bpm:
          type: number
        baseline_sigma:
          type: number
        created_at:
          type: string
          format: date-time

    RegisterResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'

    UserDetail:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            guardians:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/Guardian'
                  - type: object
                    properties:
                      id:
                        type: integer
                      user_id:
                        type: string
                        format: uuid
            latest_location:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/LatestLocation'

    LatestLocation:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
        timestamp:
          type: string

    UserWithStatus:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            status:
              type: string
              enum: [normal, warning, emergency]
            active_alert:
              nullable: true
              type: object
              additionalProperties: true
            latest_location:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/LatestLocation'

    LocationData:
      type: object
      required: [lat, lng, accuracy]
      properties:
        lat:
          type: number
        lng:
          type: number
        accuracy:
          type: number

    HeartRatePoint:
      type: object
      required: [t, bpm]
      properties:
        t:
          type: string
          description: ISO-8601 시각
        bpm:
          type: number
          minimum: 30
          maximum: 250

    HealthDataRequest:
      type: object
      required: [device_id, user_id, timestamp, heart_rate, steps_10min, location]
      properties:
        device_id:
          type: string
        user_id:
          type: string
          format: uuid
        timestamp:
          type: string
          description: ISO-8601
        heart_rate:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/HeartRatePoint'
        steps_10min:
          type: integer
          minimum: 0
        location:
          $ref: '#/components/schemas/LocationData'

    DetectionState:
      type: string
      enum:
        - normal
        - stage1_hr_high
        - stage2_waiting_inactive
        - observing
        - alert
        - unknown

    DetectionResult:
      type: object
      properties:
        state:
          $ref: '#/components/schemas/DetectionState'
        triggered:
          type: boolean
        eventType:
          type: string
          enum: [heatstroke, syncope, fall]

    HealthDataResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        detection:
          $ref: '#/components/schemas/DetectionResult'

    AlertType:
      type: string
      enum: [bt_disconnect, app_crash, manual, fall_detected]

    AlertRequest:
      type: object
      required: [device_id, user_id, type, timestamp]
      properties:
        device_id:
          type: string
        user_id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/AlertType'
        timestamp:
          type: string
        message:
          type: string
        location:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number

    AlertPostResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        action:
          type: string
          example: ai_call_triggered
        received:
          type: string

    GuardianLoginResponse:
      type: object
      properties:
        token:
          type: string
        guardian:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            relation:
              type: string
              nullable: true
